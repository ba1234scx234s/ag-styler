<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AG Styler</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      width: 100%;
      min-width: 280px;
      background: #0f0f0f;
      color: #e8e8e8;
    }

    header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #fff;
    }

    .badge {
      font-size: 10px;
      background: #1d6ef5;
      color: #fff;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 600;
    }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #1c1c1c;
    }

    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .row:last-child { margin-bottom: 0; }

    label { flex: 1; color: #ccc; }
    label.toggle { flex: none; }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 3px;
      width: 14px;
      height: 14px;
      background: #888;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: #1d6ef5; }
    .toggle input:checked + .toggle-track::after { transform: translateX(16px); background: #fff; }

    /* Font select */
    select {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      color: #e8e8e8;
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 12px;
      cursor: pointer;
      flex-shrink: 0;
    }
    select:focus { outline: none; border-color: #1d6ef5; }

    /* Colour swap rows */
    .color-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto;
      gap: 6px;
      align-items: center;
      margin-bottom: 8px;
    }
    .color-row:last-child { margin-bottom: 0; }

    .arrow { color: #555; font-size: 11px; }

    /* Colour select button */
    .color-select { position: relative; min-width: 0; }
    .color-select-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      color: #e8e8e8;
      border-radius: 5px;
      padding: 5px 7px;
      font-size: 12px;
      cursor: pointer;
      text-align: left;
      overflow: hidden;
    }
    .color-select-btn:focus { outline: none; border-color: #1d6ef5; }
    .color-select-btn .swatch {
      width: 13px; height: 13px;
      border-radius: 2px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .color-select-btn .cs-name {
      flex: 1; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
      color: #ccc;
    }
    .color-select-btn .cs-chevron { color: #444; font-size: 10px; flex-shrink: 0; }

    /* Floating dropdown */
    #colorDropdown {
      position: fixed;
      background: #181818;
      border: 1px solid #333;
      border-radius: 6px;
      list-style: none;
      padding: 4px 0;
      max-height: 220px;
      overflow-y: auto;
      z-index: 9999;
      display: none;
    }
    #colorDropdown.open { display: block; }
    #colorDropdown .dd-group {
      padding: 6px 10px 2px;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #444;
      pointer-events: none;
    }
    #colorDropdown .dd-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 12px;
    }
    #colorDropdown .dd-item:hover { background: #242424; }
    #colorDropdown .dd-item.selected { background: #1d2d44; }
    #colorDropdown .dd-item .swatch {
      width: 16px; height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #colorDropdown .dd-item .dd-name { flex: 1; color: #ccc; }
    #colorDropdown .dd-item .dd-hex { font-family: monospace; font-size: 11px; color: #555; }

    /* Plain hex input */
    .hex-input-wrap {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .hash { font-size: 12px; color: #555; font-family: monospace; }
    .hex-input-wrap input[type="text"],
    .manual-row input[type="text"] {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      color: #e8e8e8;
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 12px;
      font-family: monospace;
      width: 90px;
    }
    .hex-input-wrap input[type="text"]:focus,
    .manual-row input[type="text"]:focus { outline: none; border-color: #1d6ef5; }

    /* Manual hex swap rows */
    .manual-row {
      display: grid;
      grid-template-columns: auto 1fr auto auto 1fr auto;
      gap: 4px;
      align-items: center;
      margin-bottom: 8px;
    }
    .manual-row:last-child { margin-bottom: 0; }
    .manual-row input[type="text"] { width: 100%; min-width: 0; }

    /* Radius input */
    .radius-input-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .radius-input-wrap input[type="number"] {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      color: #e8e8e8;
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 12px;
      font-family: monospace;
      width: 72px;
      -moz-appearance: textfield;
    }
    .radius-input-wrap input[type="number"]::-webkit-inner-spin-button { display: none; }
    .radius-input-wrap input[type="number"]:focus { outline: none; border-color: #1d6ef5; }
    .unit { font-size: 12px; color: #555; }

    /* Header section color pickers */
    #headerBgWrap, #headerLinkWrap { width: 180px; flex-shrink: 0; }

    /* Logo upload */
    .btn-upload {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      color: #ccc;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .btn-upload:hover { border-color: #1d6ef5; color: #1d6ef5; }
    #logoPreviewRow {
      display: none;
      margin-top: 8px;
      padding: 6px;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 5px;
      text-align: center;
    }
    #logoPreview {
      max-width: 100%;
      max-height: 48px;
      object-fit: contain;
    }

    .btn-remove {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 3px;
    }
    .btn-remove:hover { color: #e05555; background: #2a1a1a; }

    .btn-add {
      margin-top: 6px;
      background: #1a1a1a;
      border: 1px dashed #333;
      color: #888;
      font-size: 12px;
      padding: 6px;
      width: 100%;
      border-radius: 5px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-add:hover { border-color: #1d6ef5; color: #1d6ef5; }

    footer {
      padding: 10px 16px;
      display: flex;
      gap: 8px;
    }

    .btn-save {
      flex: 1;
      background: #1d6ef5;
      border: none;
      color: #fff;
      padding: 8px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: #1558d0; }

    .btn-reset {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      color: #888;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-reset:hover { border-color: #555; color: #ccc; }

    .status {
      font-size: 11px;
      color: #4caf50;
      text-align: center;
      padding: 0 16px 10px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <header>
    <h1>AG Styler</h1>
    <span class="badge" id="statusBadge">ON</span>
  </header>

  <div class="section">
    <div class="section-label">Global</div>
    <div class="row">
      <label for="toggleEnabled">Enable overrides</label>
      <label class="toggle">
        <input type="checkbox" id="toggleEnabled" checked />
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Font</div>
    <div class="row">
      <label for="selectFont">Active font</label>
      <select id="selectFont"></select>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Border Radius</div>
    <div class="row">
      <label for="inputRadius">Button radius</label>
      <div class="radius-input-wrap">
        <input type="number" id="inputRadius" placeholder="e.g. 8" min="0" max="999" />
        <span class="unit">px</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Page Background</div>
    <div class="row">
      <label for="inputPageBg">Background colour</label>
      <div class="hex-input-wrap">
        <span class="hash">#</span>
        <input type="text" id="inputPageBg" placeholder="e.g. F5F5F5" maxlength="6" spellcheck="false" />
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Header</div>
    <div class="row">
      <label>Background</label>
      <div id="headerBgWrap"></div>
    </div>
    <div class="row">
      <label>Link &amp; interactive</label>
      <div id="headerLinkWrap"></div>
    </div>
    <div class="row">
      <label>Logo</label>
      <div style="display:flex;gap:6px;align-items:center">
        <input type="file" id="inputLogo" accept="image/*" style="display:none" />
        <button type="button" class="btn-upload" id="btnUploadLogo">Upload image</button>
        <button type="button" class="btn-remove" id="btnClearLogo" style="display:none" title="Remove logo">×</button>
      </div>
    </div>
    <div id="logoPreviewRow">
      <img id="logoPreview" />
    </div>
  </div>

  <div class="section">
    <div class="section-label">Colour Swaps</div>
    <div id="colorList"></div>
    <button class="btn-add" id="btnAddColor">+ Add colour swap</button>
  </div>

  <div class="section">
    <div class="section-label">Manual Hex</div>
    <div id="manualList"></div>
    <button class="btn-add" id="btnAddManual">+ Add manual swap</button>
  </div>

  <footer>
    <button class="btn-reset" id="btnReset">Reset</button>
    <button class="btn-save" id="btnSave">Apply</button>
  </footer>
  <div class="status" id="statusMsg"></div>

  <ul id="colorDropdown"></ul>
  <script src="popup.js"></script>
</body>
</html>
