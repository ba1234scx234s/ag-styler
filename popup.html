<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AG Styler</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      width: 320px;
      background: #0f0f0f;
      color: #e8e8e8;
    }

    header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #fff;
    }

    .badge {
      font-size: 10px;
      background: #1d6ef5;
      color: #fff;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 600;
    }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #1c1c1c;
    }

    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .row:last-child { margin-bottom: 0; }

    label { flex: 1; color: #ccc; }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 3px;
      width: 14px;
      height: 14px;
      background: #888;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: #1d6ef5; }
    .toggle input:checked + .toggle-track::after { transform: translateX(16px); background: #fff; }

    /* Colour swap rows */
    .color-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto;
      gap: 6px;
      align-items: center;
      margin-bottom: 8px;
    }

    .color-row:last-child { margin-bottom: 0; }

    .color-row input[type="text"] {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      color: #e8e8e8;
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 12px;
      font-family: monospace;
      width: 100%;
    }

    .color-row input[type="text"]:focus {
      outline: none;
      border-color: #1d6ef5;
    }

    .arrow { color: #555; font-size: 11px; }

    .btn-remove {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 3px;
    }
    .btn-remove:hover { color: #e05555; background: #2a1a1a; }

    .btn-add {
      margin-top: 6px;
      background: #1a1a1a;
      border: 1px dashed #333;
      color: #888;
      font-size: 12px;
      padding: 6px;
      width: 100%;
      border-radius: 5px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-add:hover { border-color: #1d6ef5; color: #1d6ef5; }

    footer {
      padding: 10px 16px;
      display: flex;
      gap: 8px;
    }

    .btn-save {
      flex: 1;
      background: #1d6ef5;
      border: none;
      color: #fff;
      padding: 8px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: #1558d0; }

    .btn-reset {
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      color: #888;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-reset:hover { border-color: #555; color: #ccc; }

    .status {
      font-size: 11px;
      color: #4caf50;
      text-align: center;
      padding: 0 16px 10px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <header>
    <h1>AG Styler</h1>
    <span class="badge" id="statusBadge">ON</span>
  </header>

  <div class="section">
    <div class="section-label">Global</div>
    <div class="row">
      <label for="toggleEnabled">Enable overrides</label>
      <label class="toggle">
        <input type="checkbox" id="toggleEnabled" checked />
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Font</div>
    <div class="row">
      <label for="toggleFont">Swap Open Sans → Manrope</label>
      <label class="toggle">
        <input type="checkbox" id="toggleFont" checked />
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Colour Swaps</div>
    <div id="colorList"></div>
    <button class="btn-add" id="btnAddColor">+ Add colour swap</button>
  </div>

  <footer>
    <button class="btn-reset" id="btnReset">Reset</button>
    <button class="btn-save" id="btnSave">Apply</button>
  </footer>
  <div class="status" id="statusMsg"></div>

  <script src="popup.js"></script>
</body>
</html>
